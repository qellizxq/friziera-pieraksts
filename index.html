<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Friziera pieraksts</title>

    <!-- CSS pieslēgšana -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>Friziera pieraksts</h1>

    <input type="text" id="name" placeholder="Tavs vārds">

    <select id="service">
        <option value="">Izvēlies pakalpojumu</option>
        <option value="10">Matu griešana - 10€</option>
        <option value="15">Krāsošana - 15€</option>
        <option value="8">Bārdas kopšana - 8€</option>
    </select>

    <input type="date" id="date">

    <button onclick="reserve()">Rezervēt</button>

    <p id="result"></p>
</div>

<!-- JavaScript pieslēgšana -->
<script src="script.js"></script>

</body>
</html>
